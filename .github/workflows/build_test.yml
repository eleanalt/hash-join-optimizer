name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on:
      group: k23a
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build
